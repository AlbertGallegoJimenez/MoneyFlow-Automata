name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      # Solo se dispara si cambia el JSON de datos o el propio dashboard
      - 'data/gastos.json'
      - 'index.html'
      - '.github/workflows/deploy.yml'

  # Permite lanzarlo manualmente desde la pestaña Actions de GitHub
  workflow_dispatch:

# Permisos necesarios para desplegar Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues paralelos: si hay uno en curso, el nuevo espera
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Servimos desde la raíz del repo
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
