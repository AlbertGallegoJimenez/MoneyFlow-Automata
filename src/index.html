<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyFlow — Dashboard</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0f1117;
      color: #e2e8f0;
    }
    .container {
      text-align: center;
      padding: 2rem;

      border-radius: 999px;
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }
    h1 { font-size: 2rem; margin: 0 0 0.5rem; }
    p  { color: #94a3b8; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">● Pipeline activo</div>
    <h1>💸 MoneyFlow</h1>

</html>
